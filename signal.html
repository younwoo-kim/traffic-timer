<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>신호등 타이머</title>

  <script>
    // ==================================================
    // 사용자 수정 영역
    // 나중에 신호 시간이 달라지면 여기 숫자만 바꾸면 됩니다.
    // ==================================================

    // 1번째 신호등 기준 시각
    const BASE_TIME = "07:00:35";

    // 신호 주기: 160초 = 2분 40초
    const CYCLE_SECONDS = 160;

    // 각 신호등 오프셋
    const SIGNAL_1_OFFSET = 0;
    const SIGNAL_2_OFFSET = 15;
    const SIGNAL_3_OFFSET = 52;

    // ==================================================
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 20px;
      color: white;
      transition: background 0.4s ease;
    }

    body.mode-1 {
      background: linear-gradient(135deg, #b31217 0%, #5f0a87 100%);
      --countdown-color: #ffeb3b;
    }

    body.mode-2 {
      background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
      --countdown-color: #3b2500;
    }

    body.mode-3 {
      background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
      --countdown-color: #ffeb3b;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 28px;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
    }

    .mode-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 28px;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
    }

    .time-display {
      text-align: center;
      margin: 20px 0 30px;
    }

    .current-time {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
    }

    .next-signals {
      background: rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }

    .signal-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 15px 0;
      border-bottom: 1px solid rgba(255,255,255,0.22);
    }

    .signal-item:last-child {
      border-bottom: none;
    }

    .signal-label {
      font-weight: 800;
      font-size: 16px;
      text-align: left;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    .signal-value {
      text-align: right;
      min-width: 145px;
    }

    .signal-countdown-main {
      font-size: 22px;
      font-weight: 900;
      color: var(--countdown-color);
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
      line-height: 1.2;
    }

    .signal-time-sub {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-top: 5px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.25);
    }

    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.22);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.25s ease;
      text-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }

    button:hover {
      background: rgba(255,255,255,0.34);
      transform: translateY(-2px);
    }

    button.active {
      background: rgba(255, 255, 255, 0.62);
      border-color: rgba(255, 255, 255, 0.95);
      color: #222;
      box-shadow: 0 0 18px rgba(255,255,255,0.45);
      text-shadow: none;
    }
  </style>
</head>

<body class="mode-1">
  <div class="container">
    <h1>🚦 신호등 타이머</h1>
    <div class="mode-title" id="modeTitle">1번째 신호등</div>

    <div class="time-display">
      <div class="current-time">
        현재 <span id="currentTime">--:--:--</span>
      </div>

      <div class="next-signals">
        <div class="signal-item">
          <div class="signal-label">다음 신호</div>
          <div class="signal-value">
            <div class="signal-countdown-main" id="nextCountdown">--분 --초 후</div>
            <div class="signal-time-sub" id="nextSignal">--:--:--</div>
          </div>
        </div>

        <div class="signal-item">
          <div class="signal-label">다다음 신호</div>
          <div class="signal-value">
            <div class="signal-countdown-main" id="nextNextCountdown">--분 --초 후</div>
            <div class="signal-time-sub" id="nextNextSignal">--:--:--</div>
          </div>
        </div>
      </div>
    </div>

    <div class="mode-buttons">
      <button id="btnMode1" class="active">1번째</button>
      <button id="btnMode2">2번째</button>
      <button id="btnMode3">3번째</button>
    </div>
  </div>

  <script>
    let timerInterval = null;
    let baseTime = null;
    let currentMode = 1;
    let offsetSeconds = SIGNAL_1_OFFSET;

    const modeConfig = {
      1: {
        title: '1번째 신호등',
        offset: SIGNAL_1_OFFSET,
        bodyClass: 'mode-1'
      },
      2: {
        title: '2번째 신호등',
        offset: SIGNAL_2_OFFSET,
        bodyClass: 'mode-2'
      },
      3: {
        title: '3번째 신호등',
        offset: SIGNAL_3_OFFSET,
        bodyClass: 'mode-3'
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      baseTime = createTodayBaseTime(BASE_TIME);

      if (!baseTime) return;

      bindButtons();
      applyMode(1);

      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        updateTimer();
      }
    });

    window.addEventListener('pageshow', () => {
      updateTimer();
    });

    function bindButtons() {
      document.getElementById('btnMode1').addEventListener('click', () => {
        applyMode(1);
        updateTimer();
      });

      document.getElementById('btnMode2').addEventListener('click', () => {
        applyMode(2);
        updateTimer();
      });

      document.getElementById('btnMode3').addEventListener('click', () => {
        applyMode(3);
        updateTimer();
      });
    }

    function createTodayBaseTime(timeText) {
      const parts = timeText.split(':').map(Number);

      if (parts.length < 2 || parts.length > 3 || parts.some(Number.isNaN)) {
        alert('BASE_TIME 형식이 잘못되었습니다. 예: 07:00:35');
        return null;
      }

      const hours = parts[0];
      const minutes = parts[1];
      const seconds = parts.length === 3 ? parts[2] : 0;

      if (
        hours < 0 || hours > 23 ||
        minutes < 0 || minutes > 59 ||
        seconds < 0 || seconds > 59
      ) {
        alert('BASE_TIME 값이 올바르지 않습니다.');
        return null;
      }

      if (!Number.isFinite(CYCLE_SECONDS) || CYCLE_SECONDS <= 0) {
        alert('CYCLE_SECONDS는 1 이상의 숫자여야 합니다.');
        return null;
      }

      const now = new Date();

      return new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate(),
        hours,
        minutes,
        seconds
      );
    }

    function applyMode(mode) {
      currentMode = mode;
      offsetSeconds = modeConfig[mode].offset;

      document.body.classList.remove('mode-1', 'mode-2', 'mode-3');
      document.body.classList.add(modeConfig[mode].bodyClass);

      document.getElementById('modeTitle').textContent = modeConfig[mode].title;

      document.getElementById('btnMode1').classList.toggle('active', mode === 1);
      document.getElementById('btnMode2').classList.toggle('active', mode === 2);
      document.getElementById('btnMode3').classList.toggle('active', mode === 3);
    }

    function updateTimer() {
      if (!baseTime || CYCLE_SECONDS <= 0) return;

      const now = new Date();

      document.getElementById('currentTime').textContent = formatClockTime(now);

      const adjustedBaseTime = new Date(baseTime.getTime() + offsetSeconds * 1000);
      const cycleMs = CYCLE_SECONDS * 1000;

      const elapsedMs = now.getTime() - adjustedBaseTime.getTime();

      let nextCycleIndex;

      if (elapsedMs <= 0) {
        nextCycleIndex = 0;
      } else {
        nextCycleIndex = Math.ceil(elapsedMs / cycleMs);
      }

      const nextSignalTime = new Date(
        adjustedBaseTime.getTime() + nextCycleIndex * cycleMs
      );

      const nextNextSignalTime = new Date(
        adjustedBaseTime.getTime() + (nextCycleIndex + 1) * cycleMs
      );

      const timeToNext = Math.max(
        0,
        Math.floor((nextSignalTime.getTime() - now.getTime()) / 1000)
      );

      const timeToNextNext = Math.max(
        0,
        Math.floor((nextNextSignalTime.getTime() - now.getTime()) / 1000)
      );

      document.getElementById('nextCountdown').textContent =
        formatRemainTime(timeToNext);

      document.getElementById('nextNextCountdown').textContent =
        formatRemainTime(timeToNextNext);

      document.getElementById('nextSignal').textContent =
        formatClockTime(nextSignalTime);

      document.getElementById('nextNextSignal').textContent =
        formatClockTime(nextNextSignalTime);
    }

    function formatRemainTime(totalSeconds) {
      const safeSeconds = Math.max(0, totalSeconds);
      const minutes = Math.floor(safeSeconds / 60);
      const seconds = safeSeconds % 60;

      return `${minutes}분 ${seconds}초 후`;
    }

    function formatClockTime(date) {
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');

      return `${hours}:${minutes}:${seconds}`;
    }
  </script>
</body>
</html>
