<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>신호등 타이머</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 20px;
      color: white;
      transition: background 0.4s ease;
    }

    body.mode-1 {
      background: linear-gradient(135deg, #b31217 0%, #5f0a87 100%);
    }

    body.mode-2 {
      background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
    }

    body.mode-3 {
      background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 28px;
      font-weight: 700;
    }

    .mode-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 30px;
      color: #fff;
    }

    .setup-section { margin-bottom: 30px; }

    .input-group { margin-bottom: 20px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.9);
      color: #333;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.22);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.34);
      transform: translateY(-2px);
    }

    button.active {
      background: rgba(255, 255, 255, 0.55);
      border-color: rgba(255, 255, 255, 0.9);
      color: #222;
      box-shadow: 0 0 18px rgba(255,255,255,0.45);
    }

    .time-display {
      text-align: center;
      margin: 30px 0;
    }

    .current-time {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #fff;
    }

    .next-signals {
      background: rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }

    .signal-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .signal-item:last-child {
      border-bottom: none;
    }

    .signal-label {
      font-weight: 700;
      font-size: 16px;
    }

    /* 남은시간: 크게 표시 */
    .signal-countdown-main {
      font-size: 20px;
      font-weight: 800;
      color: #ffeb3b;
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
      text-align: right;
    }

    /* 실제 신호 시각: 작게 표시 */
    .signal-time-sub {
      font-size: 14px;
      color: #f0f0f0;
      margin-top: 4px;
      text-align: right;
    }

    .hidden { display: none; }

    .row-gap {
      display: grid;
      gap: 12px;
    }

    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }

    .mode-buttons button {
      font-size: 14px;
      padding: 11px 6px;
    }
  </style>
</head>

<body class="mode-1">
  <div class="container">
    <h1>🚦 신호등 타이머</h1>
    <div class="mode-title" id="modeTitle">1번째 신호등</div>

    <div class="setup-section" id="setupSection">
      <div class="input-group">
        <label for="baseTime">기준 신호 시간</label>
        <input type="time" id="baseTime" step="1" value="07:19:15">
      </div>

      <div class="row-gap">
        <div class="input-group">
          <label for="cycleMinutes">신호 주기 (분)</label>
          <input type="number" id="cycleMinutes" value="2" min="0" max="10">
        </div>

        <div class="input-group">
          <label for="cycleSeconds">신호 주기 (초)</label>
          <input type="number" id="cycleSeconds" value="40" min="0" max="59">
        </div>
      </div>

      <button id="btnStart">타이머 시작</button>
    </div>

    <div id="timerDisplay" class="hidden">
      <div class="time-display">
        <div class="current-time" id="currentTime"></div>

        <div class="next-signals">
          <div class="signal-item">
            <div class="signal-label">다음 신호</div>
            <div>
              <div class="signal-countdown-main" id="nextCountdown"></div>
              <div class="signal-time-sub" id="nextSignal"></div>
            </div>
          </div>

          <div class="signal-item">
            <div class="signal-label">다다음 신호</div>
            <div>
              <div class="signal-countdown-main" id="nextNextCountdown"></div>
              <div class="signal-time-sub" id="nextNextSignal"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="mode-buttons">
        <button id="btnMode1" class="active">1번째</button>
        <button id="btnMode2">2번째</button>
        <button id="btnMode3">3번째</button>
      </div>

      <div style="margin-top: 16px;">
        <button id="btnReset">설정 변경</button>
      </div>
    </div>
  </div>

  <script>
    let timerInterval = null;
    let baseTime;
    let cycleSeconds = 0;
    let isRunning = false;

    let currentMode = 1;
    let offsetSeconds = 0;

    const modeConfig = {
      1: {
        title: '1번째 신호등',
        offset: 0,
        bodyClass: 'mode-1'
      },
      2: {
        title: '2번째 신호등',
        offset: 9,
        bodyClass: 'mode-2'
      },
      3: {
        title: '3번째 신호등',
        offset: 54,
        bodyClass: 'mode-3'
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const baseInput = document.getElementById('baseTime');
      if (!baseInput.value) baseInput.value = '07:19:15';

      const m = document.getElementById('cycleMinutes');
      const s = document.getElementById('cycleSeconds');
      if (!m.value) m.value = '2';
      if (!s.value) s.value = '40';

      applyMode(1);

      setTimeout(() => {
        startTimer();
      }, 100);
    });

    document.getElementById('btnStart').addEventListener('click', () => {
      startTimer();
    });

    document.getElementById('btnMode1').addEventListener('click', () => {
      applyMode(1);
      updateTimer();
    });

    document.getElementById('btnMode2').addEventListener('click', () => {
      applyMode(2);
      updateTimer();
    });

    document.getElementById('btnMode3').addEventListener('click', () => {
      applyMode(3);
      updateTimer();
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      stopTimer();
      applyMode(1);

      document.getElementById('setupSection').classList.remove('hidden');
      document.getElementById('timerDisplay').classList.add('hidden');
    });

    function applyMode(mode) {
      currentMode = mode;
      offsetSeconds = modeConfig[mode].offset;

      document.body.classList.remove('mode-1', 'mode-2', 'mode-3');
      document.body.classList.add(modeConfig[mode].bodyClass);

      document.getElementById('modeTitle').textContent = modeConfig[mode].title;

      document.getElementById('btnMode1').classList.toggle('active', mode === 1);
      document.getElementById('btnMode2').classList.toggle('active', mode === 2);
      document.getElementById('btnMode3').classList.toggle('active', mode === 3);
    }

    function startTimer() {
      if (isRunning) return;

      const baseTimeInput = document.getElementById('baseTime').value;
      const cycleMinutes = parseInt(document.getElementById('cycleMinutes').value || '0', 10);
      const cycleSecs = parseInt(document.getElementById('cycleSeconds').value || '0', 10);

      if (!baseTimeInput || isNaN(cycleMinutes) || isNaN(cycleSecs)) {
        alert('기준 시간과 주기를 올바르게 입력해주세요.');
        return;
      }

      cycleSeconds = (cycleMinutes * 60) + cycleSecs;

      if (cycleSeconds <= 0) {
        alert('신호 주기는 1초 이상이어야 합니다.');
        return;
      }

      const today = new Date();
      const [hours, minutes, seconds] = baseTimeInput.split(':').map(Number);

      baseTime = new Date(
        today.getFullYear(),
        today.getMonth(),
        today.getDate(),
        hours,
        minutes,
        seconds
      );

      document.getElementById('setupSection').classList.add('hidden');
      document.getElementById('timerDisplay').classList.remove('hidden');

      isRunning = true;
      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      isRunning = false;
    }

    function formatRemainTime(totalSeconds) {
      const safeSeconds = Math.max(0, totalSeconds);
      const minutes = Math.floor(safeSeconds / 60);
      const seconds = safeSeconds % 60;
      return `${minutes}분 ${seconds}초 후`;
    }

    function updateTimer() {
      if (!baseTime || cycleSeconds <= 0) return;

      const now = new Date();

      document.getElementById('currentTime').textContent =
        now.toLocaleTimeString('ko-KR', { hour12: false });

      const adjustedBaseTime = new Date(baseTime.getTime() + offsetSeconds * 1000);

      let elapsed = Math.floor((now - adjustedBaseTime) / 1000);
      let nextCycleIndex;

      if (elapsed < 0) {
        nextCycleIndex = 0;
      } else {
        nextCycleIndex = Math.floor(elapsed / cycleSeconds) + 1;
      }

      const nextSignalTime = new Date(
        adjustedBaseTime.getTime() + nextCycleIndex * cycleSeconds * 1000
      );

      const nextNextSignalTime = new Date(
        adjustedBaseTime.getTime() + (nextCycleIndex + 1) * cycleSeconds * 1000
      );

      const timeToNext = Math.ceil((nextSignalTime - now) / 1000);
      const timeToNextNext = Math.ceil((nextNextSignalTime - now) / 1000);

      document.getElementById('nextCountdown').textContent =
        formatRemainTime(timeToNext);

      document.getElementById('nextNextCountdown').textContent =
        formatRemainTime(timeToNextNext);

      document.getElementById('nextSignal').textContent =
        nextSignalTime.toLocaleTimeString('ko-KR', { hour12: false });

      document.getElementById('nextNextSignal').textContent =
        nextNextSignalTime.toLocaleTimeString('ko-KR', { hour12: false });
    }
  </script>
</body>
</html>
